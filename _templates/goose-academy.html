<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <meta name="description" content="{{i18n:appDescription.short}}" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #e6eaf5;
        color: #343434;
        line-height: 1.7;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #0e7490;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        max-width: 960px;
        margin: 0 auto;
        width: 100%;
      }
      .nav-back {
        font-size: 14px;
        font-weight: 600;
        color: #5e5e5e;
      }
      .nav-back:hover {
        color: #0e7490;
      }
      .lang-toggle {
        font-size: 13px;
        font-weight: 600;
        color: #888;
      }
      .lang-toggle a {
        color: #0e7490;
      }
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        max-width: 640px;
        margin: 0 auto;
      }
      .emoji-icon {
        font-size: 96px;
        margin-bottom: 24px;
        display: block;
        width: 140px;
        height: 140px;
        line-height: 140px;
        border-radius: 32px;
        background: #e6eaf5;
        box-shadow:
          6px 6px 16px rgba(163, 170, 190, 0.6),
          -6px -6px 16px rgba(255, 255, 255, 0.8);
      }
      h1 {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .tagline {
        font-size: 16px;
        font-weight: 600;
        color: #0e7490;
        margin-bottom: 12px;
      }
      .coming-soon {
        display: inline-block;
        padding: 8px 24px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 600;
        color: #0e7490;
        background: #e6eaf5;
        box-shadow:
          4px 4px 10px rgba(163, 170, 190, 0.5),
          -4px -4px 10px rgba(255, 255, 255, 0.7);
        margin-bottom: 24px;
      }
      .description {
        font-size: 16px;
        color: #5e5e5e;
        max-width: 400px;
      }
      .footer {
        text-align: center;
        padding: 40px 24px;
        max-width: 720px;
        margin: 0 auto;
        border-top: 1px solid #d0d4e3;
        width: 100%;
      }
      .footer-links {
        margin-bottom: 16px;
      }
      .footer-links a {
        font-size: 14px;
        margin: 0 8px;
        color: #0e7490;
      }
      .footer .contact {
        font-size: 13px;
        color: #888;
      }
      .footer .contact a {
        color: #888;
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a class="nav-back" href="{{navBackHref}}">← pidup games</a>
      <span class="lang-toggle">{{langToggle}}</span>
    </nav>

    <main class="main">
      <div class="emoji-icon">🪿</div>
      <h1>Goose Academy</h1>
      <p class="tagline">{{i18n:appDescription.tagline}}</p>
      <span class="coming-soon">{{i18n:appDescription.badge}}</span>
      <p class="description">{{i18n:appDescription.description}}</p>
    </main>

    <footer class="footer">
      <div class="footer-links">{{footerLinks}}</div>
      <p class="contact">
        {{contactLabel}}
        <a href="mailto:pidup-games@proton.me">pidup-games@proton.me</a>
      </p>
    </footer>
  </body>
</html>
